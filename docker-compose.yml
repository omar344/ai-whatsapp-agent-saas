services:
  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: saas_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin # In Milestone 2, we'll move this to .env
      POSTGRES_DB: ai_agent_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ai_agent_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: saas_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: